events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain application/json application/javascript text/css;

  # Rate-limit: 20 req/s per IP, burst of 50
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name card.hfsp.cloud;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name card.hfsp.cloud;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self' https://api.cow.fi https://rpc.gnosis.gateway.fm" always;

    # API — proxy to Express
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://server:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # Health check (public, no rate limit)
    location /health {
      proxy_pass         http://server:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }

    # Frontend static files
    location / {
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public, max-age=3600";
    }

    # Immutable hashed assets
    location ~* \.(js|css|woff2?)$ {
      root    /usr/share/nginx/html;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }
  }
}
